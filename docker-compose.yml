# Root Docker Compose for SilverWiki
# Isolates custom theme mounting to keep bookstack directory clean of tracked modifications.

volumes:
  db: {}
  ollama_data: {}

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bookstack-dev
      MYSQL_USER: bookstack-test
      MYSQL_PASSWORD: bookstack-test
      MYSQL_RANDOM_ROOT_PASSWORD: 'true'
    volumes:
      - ./bookstack/dev/docker/init.db:/docker-entrypoint-initdb.d
      - db:/var/lib/mysql
  app:
    build:
      context: ./bookstack
      dockerfile: ./dev/docker/Dockerfile
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:${DEV_PORT:-8080}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: bookstack-dev
      DB_USERNAME: bookstack-test
      DB_PASSWORD: bookstack-test
      TEST_DATABASE_URL: mysql://bookstack-test:bookstack-test@db/bookstack-test
      MAIL_DRIVER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      XDEBUG_MODE: "off"
    ports:
      - ${DEV_PORT:-8080}:80
    volumes:
      - ./bookstack:/app
      - ./theme:/app/themes/silverwiki
      - ./bookstack/dev/docker/php/conf.d/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    entrypoint: /app/dev/docker/entrypoint.app.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
  node:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    user: node
    volumes:
      - ./bookstack:/app
    entrypoint: /app/dev/docker/entrypoint.node.sh
  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - ${DEV_MAIL_PORT:-8025}:8025
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - 11434:11434
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c '
      echo "Waiting for Ollama to be ready...";
      while ! ollama list > /dev/null 2>&1; do sleep 2; done;
      echo "Pulling nomic-embed-text...";
      ollama pull nomic-embed-text;
      echo "Pulling gemma4:e2b...";
      ollama pull gemma4:e2b;
      echo "Done.";
      '
